<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo Azul Marino de la Plataforma -->
  <rect width="500" height="500" fill="#071426" />
  
  <!-- Icono Escalado y Centrado -->
  <g transform="translate(145, 140) scale(3.5)">
    <!-- V Left Stroke -->
    <path
      d="M0 0 L15 32 C18 38 25 40 30 35 L50 15"
      stroke="white"
      stroke-width="6"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Upward Arrow (Orange) -->
    <path
      d="M30 35 L60 5 L45 5 M60 5 L60 20"
      stroke="#FF7A00"
      stroke-width="6"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <!-- Play Icon / Dot -->
    <circle cx="20" cy="25" r="5" fill="#FF7A00" />
  </g>
</svg>
