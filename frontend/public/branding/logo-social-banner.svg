<svg width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo Azul Marino de la Plataforma -->
  <rect width="1500" height="500" fill="#071426" />
  
  <!-- Logo Completo Centrado y Escalado -->
  <!-- El viewBox original del logo es 280x64. Escalado x3 = 840x192.
       Posición para centrar: X = (1500 - 840) / 2 = 330. Y = (500 - 192) / 2 = 154 -->
  <g transform="translate(330, 154) scale(3)">
    
    <!-- Icono (V + Arrow + Play) -->
    <g transform="translate(10, 8)">
      <path d="M0 0 L15 32 C18 38 25 40 30 35 L50 15" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M30 35 L60 5 L45 5 M60 5 L60 20" stroke="#FF7A00" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <circle cx="20" cy="25" r="5" fill="#FF7A00" />
    </g>

    <!-- Texto: View -->
    <text x="80" y="42" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="36" fill="#FFFFFF" letter-spacing="-1">
      View
    </text>

    <!-- Texto: lytics -->
    <text x="165" y="42" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="36" fill="#FF7A00" letter-spacing="-1">
      lytics
    </text>

  </g>
</svg>
