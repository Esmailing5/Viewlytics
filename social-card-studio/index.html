<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,800;1,900&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">
    <title>Viewlytics Social Card Studio</title>
  </head>
  <body>
    <div class="app-container">
      
      <!-- HEADER -->
      <header class="top-bar">
        <div class="top-bar-left">
          <button class="mobile-menu-btn" id="btn-mobile-menu">
            <i data-lucide="menu"></i>
          </button>
          <h1 id="view-title">Single Creator Card</h1>
        </div>
        <div class="format-selector">
          <button class="format-btn active" data-format="4:5">IG & FB Feed (4:5)</button>
          <button class="format-btn" data-format="1:1">Square (1:1)</button>
          <button class="format-btn" data-format="9:16">Reels & Stories (9:16)</button>
          <button class="format-btn" data-format="16:9">Web / X (16:9)</button>
        </div>
      </header>

      <!-- SIDEBAR -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="logo">
            <!-- Viewlytics icon representation -->
            <svg class="logo-icon cyan" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
            <span>Viewlytics<br><small>Studio</small></span>
          </div>
        </div>

        <nav class="sidebar-nav">
          <div class="nav-group">
            <div class="nav-label">TOOLS</div>
            <a href="#" class="nav-item active" data-view="single-card">
              <i data-lucide="layout-template"></i>
              Single Card
            </a>
            <a href="#" class="nav-item" data-view="top-ranking">
              <i data-lucide="list-ordered"></i>
              Top 1-10 Ranking
            </a>
            <a href="#" class="nav-item" data-view="top-11-to-20">
              <i data-lucide="list-ordered"></i>
              Top 11-20 Ranking
            </a>
          </div>

          <div class="nav-group">
            <div class="nav-label">PERSISTENCE</div>
            <a href="#" class="nav-item" data-view="templates">
              <i data-lucide="layers"></i>
              Templates
            </a>
            <a href="#" class="nav-item" data-view="history">
              <i data-lucide="history"></i>
              History
            </a>
          </div>
        </nav>

        <div class="sidebar-footer">
          <button id="btn-export-png" class="btn btn-primary w-full">
            <i data-lucide="download"></i> Export PNG (HQ)
          </button>
          <button id="btn-copy-clipboard" class="btn btn-secondary w-full mt-2">
            <i data-lucide="copy"></i> Copy to Clipboard
          </button>
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="main-content">
        <div class="workspace">
          <!-- EDITOR PANEL (Left / Bottom) -->
          <div class="editor-panel scrollable" id="editor-container">
            <!-- Dynamically loaded editors go here -->
          </div>

          <!-- PREVIEW PANEL (Right / Top) -->
          <div class="preview-panel">
            <div class="preview-wrapper" id="preview-wrapper">
              <div class="export-container" id="export-container" data-aspect="4:5">
                 <!-- Exportable card content -->
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- TOAST CONTAINER -->
      <div id="toast-container"></div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
